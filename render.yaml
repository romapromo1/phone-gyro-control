services:
  - type: web
    name: phone-gyro-control
    runtime: node
    region: frankfurt
    plan: starter
    numInstances: 1
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run verify
    startCommand: npm start
    healthCheckPath: /health
    maxShutdownDelaySeconds: 30
    disk:
      name: session-events
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: EVENT_DATA_DIR
        value: /var/data
      - key: OPERATOR_TOKEN
        generateValue: true
      - key: KIOSK_TOKEN
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_IMAGE_MODEL
        value: google/gemini-3.1-flash-image
      - key: OPENROUTER_TIMEOUT_MS
        value: 480000
